<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
const convert = function (s, numRows) {
    if (numRows === 1) {
        return s;
    }
    const resultArr = Array.from({length: numRows}, () => '');
    const range = numRows * 2 - 2;
    for (let i = 0; i < s.length; i++) {
        if (i % range < numRows) {
            resultArr[i % range] = resultArr[i % range] + s[i];
        } else {
            resultArr[range - i % range] = resultArr[range - i % range] + s[i];
        }
    }
    return resultArr.reduce((acc, cur) => {
        return acc += cur;
    }, '');
};
// P   A   H   N
// A P L S I I G
// Y   I   R




// P     I    N
// A   L S  I G
// Y A   H R
// P     I


console.log(convert("", 7));
console.log(convert("PAYPALISHIRING", 1));
console.log(convert("PAYPALISHIRING", 2));
console.log(convert("PAYPALISHIRING", 3));
console.log(convert("PAYPALISHIRING", 4));
console.log(convert("PAYPALISHIRING", 5));

</script>
</body>
